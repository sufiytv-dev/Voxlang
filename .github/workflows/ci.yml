name: Voxlang CI/CD Pipeline

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  # Stage 1: Compile VXM for all 3 major architectures
  build-vxm:
    name: Build VXM (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            bin_name: vxm
            asset_name: vxm-linux-amd64
          - os: macos-latest
            bin_name: vxm
            asset_name: vxm-macos-amd64
          - os: windows-latest
            bin_name: vxm.exe
            asset_name: vxm-windows-amd64.exe

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y clang lld z3

      - name: Install Dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          # MacPorts is the recommended package manager for Voxlang on macOS
          sudo port install z3

      - name: Compile VXM Orchestrator
        run: cargo build -p vxm --release

      - name: Rename Artifact (Unix)
        if: matrix.os != 'windows-latest'
        run: mv target/release/${{ matrix.bin_name }} target/release/${{ matrix.asset_name }}

      - name: Rename Artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: Rename-Item -Path "target\release\${{ matrix.bin_name }}" -NewName "${{ matrix.asset_name }}"

      - name: Upload Release Asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Stage 2: Native Validation of the Vox Compiler Core
  test-vox:
    name: Core Compiler Conformance (${{ matrix.os }})
    needs: build-vxm
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y clang lld z3

      - name: Install Dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          sudo port install z3

      - name: Build Vox Compiler
        run: cargo build --release

      - name: Run Conformance Suite
        shell: bash
        run: target/release/vox test
        # GPU tests (kernel.vx) automatically use CPU fallback on CI runners
